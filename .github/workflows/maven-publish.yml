# This workflow will build a package using Maven and then upload it to a GitHub release
name: Maven Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    
    # Updated permissions to allow modifying the release
    permissions:
      contents: write 

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        # Removed the server-id and settings-path as they are only needed for GitHub Packages

    - name: Build with Maven
      run: mvn -B package --file pom.xml
            
    - name: Upload JAR to GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload ${{ github.event.release.tag_name }} target/*.jar
